<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>test maker</title>
    <link rel="stylesheet" href="dist/test_maker.css">
    <script src="https://kit.fontawesome.com/636db4ca92.js" crossorigin="anonymous"></script>
</head>
<body>

<main>
    <section class="variant-select-wrapper">
        <header>Varianty</header>

        <div class="content"></div>
    </section>

    <section class="question-select-wrapper">
        <header>Otázky</header>

        <div class="content">
            <div class="subject">
                <span> Subject </span>
            </div>
            <div class="category">
                <span> Category </span>
            </div>
        </div>
    </section>

    <section class="preview-wrapper">
        <header>Ukázka vybrané varianty</header>

        <div class="content"></div>
    </section>
</main>

<script src="app/js/preview_manager.js"></script>
<script src="app/js/question_fetch.js"></script>

</body>
</html>
