<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="dist/style.css">
</head>
<body>

<header>
    <a th:href="@{/test_template}"> link to test template </a> <br>
    <a th:href="@{/test_maker}"> link to test maker </a>

    <form th:action="@{/test_template}" method="get" style="margin-top: 15px;">
        <label for="variantInput" style="font-weight: bold;">Číslo Varianty:</label>
        <input type="number"
               id="variantInput"
               name="variant"
               min="1"
               max="4"
               value="1"
               style="padding: 5px; width: 60px; border: 2px solid #000; font-weight: bold;">

        <button type="submit" style="padding: 5px 15px; cursor: pointer; font-weight: bold; background-color: #A488EF;">
            Zobrazit Variantu
        </button>
    </form>

    <div th:if="${param.error}" style="color: red; margin-top: 10px; font-weight: bold;">
        Chyba: Zadaná varianta neexistuje v paměti!
    </div>
</header>
<aside></aside>
<main>
    <section class="test-folders-main">
        <div id="folders">
            <div class="test-folder-wrapper">
                <div class="test-folder-content"></div>
            </div>

            <div class="test-folder-wrapper">

                <div class="test-folder-content">

                </div>
            </div>

            <div class="test-folder-wrapper">

                <div class="test-folder-content"></div>
            </div>

            <div class="test-folder-wrapper">
                <svg class="folder-svg" width="300" height="200" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 28.6525V20C0 8.95431 8.9543 0 20 0H102.778L126.639 28.6525H290C295.523 28.6525 300 33.1296 300 38.6525V190C300 195.523 295.523 200 290 200H10C4.47716 200 0 195.523 0 190V28.6525Z" fill="#D9D9D9"/>
                </svg>

                <div class="test-folder-content"></div>
            </div>

        </div>
    </section>
    <section class="subjects-and-categories-main"></section>
</main>

</body>
</html>
