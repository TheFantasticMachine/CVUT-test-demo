spring.application.name=demo

# Tell Spring how to locate your local XAMPP MySQL database instance
spring.datasource.url=jdbc:mysql://localhost:3306/CVUT
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Keeps your database connection pool steady and optimized
spring.datasource.hikari.maximum-pool-size=10

# FIXED: Explicitly tells Hibernate it's a MySQL database so it skips querying metadata at startup
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# FIXED: Prevents Hibernate from trying to automatically alter your database tables
spring.jpa.hibernate.ddl-auto=none